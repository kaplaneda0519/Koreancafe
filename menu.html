<script>
    // --- FİLTRELEME FONKSİYONU ---
    function filtreUygula(kelime) {
        const query = kelime.toLowerCase();
        const items = document.querySelectorAll('.menu-item');

        items.forEach(item => {
            const title = item.querySelector('.card-title').innerText.toLowerCase();
            item.style.display = title.includes(query) ? "block" : "none";
        });
    }

    // Arama kutusuna yazıldığında çalışır
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', function() {
        filtreUygula(this.value);
    });

    // --- ANA SAYFADAN GELEN ARAMAYI YAKALAMA ---
    window.addEventListener('load', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const aranan = urlParams.get('ara'); 
        
        if (aranan) {
            searchInput.value = aranan; // Kutuyu doldur
            filtreUygula(aranan);      // Filtreyi çalıştır
        }
        badgeGuncelle();
    });

    // --- SEPET FONKSİYONLARI ---
    function sepeteEkle(ad, fiyat, resim) {
        let sepet = JSON.parse(localStorage.getItem('sepet')) || [];
        sepet.push({ ad: ad, fiyat: fiyat, resim: resim });
        localStorage.setItem('sepet', JSON.stringify(sepet));
        badgeGuncelle();
        alert(ad + " sepete eklendi!");
    }

    function badgeGuncelle() {
        let sepet = JSON.parse(localStorage.getItem('sepet')) || [];
        const badge = document.getElementById('sepetAdet');
        if(badge) badge.innerText = sepet.length;
    }
</script>
